window.addEventListener("load", async function(){
        // Fetch and update profile info dynamically from about.json
        try {
            const aboutRes = await fetch('content/data/about.json');
            if (aboutRes.ok) {
                const aboutData = await aboutRes.json();
                const profileImgEl = document.getElementById('header-profile-img');
                const profileNameEl = document.getElementById('header-profile-name');
                if (profileImgEl && aboutData.profileImage) {
                    profileImgEl.src = aboutData.profileImage;
                }
                if (profileNameEl && aboutData.name) {
                    profileNameEl.textContent = aboutData.name;
                }
            }
        } catch(e) {
            console.error('Failed to load about data:', e);
        }

    document.body.style.visibility = 'visible';
    document.body.style.opacity = '1';
});
</script>

    <script type="module">
        let phonesDatabase = [];
        try {
            const res = await fetch('content/data/phones.json');

        } catch(e) {
            console.error('Failed to load phones database:', e);
        }

        const specsMap = [{ key: "screen", label: "الشاشة" }, { key: "chipset", label: "المعالج" }, { key: "ram", label: "الرام" }, { key: "storage", label: "التخزين" }, { key: "camera", label: "الكاميرا" }, { key: "battery", label: "البطارية" }];
        const brandA = document.getElementById('brandA'); const modelA = document.getElementById('modelA'); const brandB = document.getElementById('brandB'); const modelB = document.getElementById('modelB'); const compareBtn = document.getElementById('compareBtn'); const compareResult = document.getElementById('compareResult'); const specsContainer = document.getElementById('specsContainer');
        function populateBrands() {
            const brands = phonesDatabase.map(b => b.brand);
            [brandA, brandB].forEach(select => { select.innerHTML = '<option value="">اختر الشركة</option>'; brands.forEach(brand => { const option = document.createElement('option'); option.value = brand; option.textContent = brand; select.appendChild(option); }); });
        }
        function handleBrandChange(brandSelect, modelSelect) {
            const selectedBrand = brandSelect.value; modelSelect.innerHTML = '<option value="">اختر الموديل</option>'; modelSelect.disabled = true;
            if (selectedBrand) { const brandData = phonesDatabase.find(b => b.brand === selectedBrand); if (brandData) { brandData.phones.forEach(phone => { const option = document.createElement('option'); option.value = phone.id; option.textContent = phone.name; modelSelect.appendChild(option); }); modelSelect.disabled = false; } }
        }
        brandA.addEventListener('change', () => handleBrandChange(brandA, modelA)); brandB.addEventListener('change', () => handleBrandChange(brandB, modelB));
        populateBrands();
        compareBtn.addEventListener('click', () => {
            const idA = modelA.value; const idB = modelB.value;
            if (!idA || !idB) { alert("يرجى اختيار هاتفين للمقارنة"); return; }
            let phoneA, phoneB;
            phonesDatabase.forEach(brand => { const foundA = brand.phones.find(p => p.id === idA); if (foundA) phoneA = foundA; const foundB = brand.phones.find(p => p.id === idB); if (foundB) phoneB = foundB; });
            document.getElementById('nameA').textContent = phoneA.name; document.getElementById('nameB').textContent = phoneB.name;
            
            // Image handling
            let imgContA = document.getElementById('imgContainerA');
            if(!imgContA) {
                imgContA = document.createElement('div');
                imgContA.id = 'imgContainerA';
                imgContA.className = 'h-32 sm:h-48 w-full mx-auto flex items-center justify-center overflow-hidden mb-4';
                const headerA = document.getElementById('nameA').parentElement;
                headerA.insertBefore(imgContA, headerA.firstChild);
            }
            if(phoneA.image) {
                imgContA.innerHTML = `<img src="${phoneA.image}" alt="${phoneA.name}" class="h-full w-auto max-w-full object-contain p-2 mx-auto" onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOUNBM0FGIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHJlY3QgeD0iNSIgeT0iMiIgd2lkdGg9IjE0IiBoZWlnaHQ9IjIwIiByeD0iMiIgcnk9IjIiPjwvcmVjdD48bGluZSB4MT0iMTIiIHkxPSIxOCIgeDI9IjEyLjAxIiB5Mj0iMTgiPjwvbGluZT48L3N2Zz4=';">`;
                imgContA.style.display = 'flex';
            } else {
                imgContA.innerHTML = `<img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOUNBM0FGIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHJlY3QgeD0iNSIgeT0iMiIgd2lkdGg9IjE0IiBoZWlnaHQ9IjIwIiByeD0iMiIgcnk9IjIiPjwvcmVjdD48bGluZSB4MT0iMTIiIHkxPSIxOCIgeDI9IjEyLjAxIiB5Mj0iMTgiPjwvbGluZT48L3N2Zz4=" alt="Phone Placeholder" class="h-full w-auto max-w-full object-contain p-2 mx-auto opacity-30">`;
                imgContA.style.display = 'flex';
            }

            let imgContB = document.getElementById('imgContainerB');
            if(!imgContB) {
                imgContB = document.createElement('div');
                imgContB.id = 'imgContainerB';
                imgContB.className = 'h-32 sm:h-48 w-full mx-auto flex items-center justify-center overflow-hidden mb-4';
                const headerB = document.getElementById('nameB').parentElement;
                headerB.insertBefore(imgContB, headerB.firstChild);
            }
            if(phoneB.image) {
                imgContB.innerHTML = `<img src="${phoneB.image}" alt="${phoneB.name}" class="h-full w-auto max-w-full object-contain p-2 mx-auto" onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOUNBM0FGIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHJlY3QgeD0iNSIgeT0iMiIgd2lkdGg9IjE0IiBoZWlnaHQ9IjIwIiByeD0iMiIgcnk9IjIiPjwvcmVjdD48bGluZSB4MT0iMTIiIHkxPSIxOCIgeDI9IjEyLjAxIiB5Mj0iMTgiPjwvbGluZT48L3N2Zz4=';">`;
                imgContB.style.display = 'flex';
            } else {
                imgContB.innerHTML = `<img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOUNBM0FGIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHJlY3QgeD0iNSIgeT0iMiIgd2lkdGg9IjE0IiBoZWlnaHQ9IjIwIiByeD0iMiIgcnk9IjIiPjwvcmVjdD48bGluZSB4MT0iMTIiIHkxPSIxOCIgeDI9IjEyLjAxIiB5Mj0iMTgiPjwvbGluZT48L3N2Zz4=" alt="Phone Placeholder" class="h-full w-auto max-w-full object-contain p-2 mx-auto opacity-30">`;
                imgContB.style.display = 'flex';
            }

            specsContainer.innerHTML = '';
            specsMap.forEach(spec => {
                const valA = phoneA.specs[spec.key] || '-'; const valB = phoneB.specs[spec.key] || '-';
                const row = document.createElement('div'); row.className = "grid grid-cols-3 border-b border-gray-100 dark:border-gray-700 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors group";
                row.innerHTML = `<div class="p-4 text-center border-l border-gray-100 dark:border-gray-700 text-gray-800 dark:text-gray-200 text-sm flex items-center justify-center">${valA}</div><div class="p-4 text-center border-l border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/30 flex items-center justify-center"><span class="font-bold text-gray-500 dark:text-gray-400 text-sm uppercase tracking-wider">${spec.label}</span></div><div class="p-4 text-center text-gray-800 dark:text-gray-200 text-sm flex items-center justify-center">${valB}</div>`;
                specsContainer.appendChild(row);
            });
            compareResult.classList.remove('hidden'); compareResult.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
